<!DOCTYPE html>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* 标题栏样式 */
        .header {
            min-height: 60px;
            max-height: 120px;
            background: white /* linear-gradient(135deg, #2491ff 0%, #247cff 100%)*/;
            color: black;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .header-subtitle {
            font-size: 12px;
            opacity: 0.9;
            font-weight: 350;
        }

        .header-button {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 4px 9px;
            border-radius: 6px;
            font-size: 13px;
			font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
			min-width: 114px;
        }

        .header-button:hover {
            background: rgba(0, 0, 0, 1);
            transform: translateY(-1px);
        }

        /* 内容区域 */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Tab 栏 */
        .tab-bar {
            display: flex;
            flex-wrap: wrap;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 0;
            flex-shrink: 0;
            gap: 2px;
        }

        .tab {
            padding: 6px 6px;
            background: white;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 12px;
            color: #64748b;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s ease;
            min-width: 45px;
            flex: 1 1 auto;
            max-width: 100px;
        }

        .tab:hover {
            background: #f8fafc;
            color: #334155;
        }

        .tab.active {
            color: #394250;
            border-bottom-color: #394250;
            background: #f8fafc;
        }

        /* iframe 容器 */
        .iframe-container {
            flex: 1;
            overflow: hidden;
            background: white;
        }

        .iframe-content {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .iframe-content.active {
            display: block;
        }
    </style>
</head>
<body>

    <script>
        // 定义每个 tab 对应的 URL（可根据需要修改）
        const tabUrls = {
            '1': 'https://airtable.com/embed/appGUBHxmCaij90Hj/shrzmp6LQBaes2yKa?',
            '2': 'https://airtable.com/embed/appGUBHxmCaij90Hj/shreROvh8OBcU46uL?',

            '6': 'https://airtable.com/embed/appGUBHxmCaij90Hj/shrZM1ZRrw8QmCfzZ?',

        };

        // 定义每个 tab 对应的示例内容（可选，用于演示）有修改
        const tabContents = {
            //'1': '<!DOCTYPE html><html><head><style>body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:Arial,sans-serif;background:#f0f9ff}</style></head><body><h2 style="color:#667eea">标签页 1</h2></body></html>',
            //'2': '<!DOCTYPE html><html><head><style>body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:Arial,sans-serif;background:#f0fdf4}</style></head><body><h2 style="color:#22c55e">标签页 2</h2></body></html>',
            //'3': '<!DOCTYPE html><html><head><style>body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:Arial,sans-serif;background:#fef2f2}</style></head><body><h2 style="color:#ef4444">标签页 3</h2></body></html>',
        };

        // 记录已加载的 iframe
        const loadedIframes = new Set(['1']);

        // Tab 切换功能
        const tabs = document.querySelectorAll('.tab');
        const iframes = document.querySelectorAll('.iframe-content');

        // 初始加载第一个 tab 的内容 有修改
        const firstIframe = document.getElementById('iframe-1');
        //if (tabContents['1']) {
        firstIframe.src = tabUrls['1'];
        //}

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabIndex = tab.dataset.tab;

                // 移除所有 tab 的 active 状态
                tabs.forEach(t => t.classList.remove('active'));
                // 隐藏所有 iframe
                iframes.forEach(iframe => iframe.classList.remove('active'));

                // 激活当前 tab
                tab.classList.add('active');

                // 获取对应的 iframe
                const targetIframe = document.getElementById(`iframe-${tabIndex}`);
                targetIframe.classList.add('active');

                // 懒加载：如果该 iframe 还未加载，则加载其内容
                if (!loadedIframes.has(tabIndex)) {
                    if (tabContents[tabIndex]) {
                        // 如果有示例内容，使用 srcdoc
                        targetIframe.srcdoc = tabContents[tabIndex];
                    } else {
                        // 否则使用 src
                        targetIframe.src = tabUrls[tabIndex] || 'about:blank';
                    }
                    // 标记为已加载
                    loadedIframes.add(tabIndex);
                }
            });
        });
    </script>
